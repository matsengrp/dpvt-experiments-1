models: [
    "TraverseNN",
    "TraverseMaxPooling",
    "TraverseAvgPooling",
    "LinearNN",
    "LinearMaxPooling",
    "LinearAvgPooling",
    "BaselineReversion", # can only run on CPU!
  ]
train_data: [
  "larch_alisim_alignment_10_seq_20_sites_100_algnmnts",
  "larch_alisim_alignment_10_seq_20_sites_100_algnmnts_spr",
  "larch_alisim_alignment_15_seq_20_sites_100_algnmnts",
  "larch_alisim_alignment_15_seq_20_sites_100_algnmnts_spr",
  ]
test_data: [
  "larch_alisim_alignment_10_seq_20_sites_50_algnmnts",
  "larch_alisim_alignment_10_seq_20_sites_50_algnmnts_spr",
  "larch_alisim_alignment_15_seq_20_sites_50_algnmnts",
  "larch_alisim_alignment_15_seq_20_sites_50_algnmnts_spr",
  ]

device: "cpu"
timestamp: "TODAY"
use_cross_datasets: True
output_dir: "_output"
data_nicknames_path: "data_nicknames.json"
evaluate_tree_search: False
use_hyperparameter_optimize: False
use_preprocessing: True
force_repreprocess: False
n_hyperparameter_trials: 50

hyperparameters:
  learning_rate: [0.00005]
  batch_size: [4]
  accum_grad_batches: [2]
  epochs: [200]
  feature_length: [64]
  dim_mlp_layers: [256]
