# Config for simulated_15_seq_20_sites_100_algnmnts - Phases 1 & 2
# This config is for preprocessing and dataset preparation

# ============================================================================
# Dataset Identification
# ============================================================================
dataset_name: "simulated_15_seq_20_sites_100_algnmnts"
input_data: "/home/lcollien/work/git/dpvt-experiments-1/dpvtex/larch/scripts/../../../data/simulated_alignments/simulated_15_seq_20_sites_100_algnmnts"

# ============================================================================
# Phase 1: Preprocessing Settings (sequence-level filtering)
# ============================================================================
max_ambiguous_site_frac_per_seq: 0.2     # Remove sequences with >20% gaps/ambiguous chars
remove_duplicate_site_patterns: False    # Whether to deduplicate columns

# ============================================================================
# Phase 2: Dataset Preparation Settings (alignment-level filtering)
# ============================================================================
output_datasets: "../../data"
min_frac_sites_retained: 0.8             # Exclude alignments that lost >19% of sites

# Train/test splitting disabled (use _generate.yaml for Phase 3)
create_train_test_split: False

# ============================================================================
# Phase 3: Training Data Generation Settings
# ============================================================================
larch_command: /home/lcollien/work/git/larch/build/bin/larch-usher                   # Command to run larch (can be "larch", "larch-phylo", or a full path)
larch_output: "../../data"
edge_distributions:
  - "constant"
  - "random_subtree"            # Options: constant, uniform, treesearch_mimic, random_subtree
num_cores: 8

# Tree extraction parameters
max_trees: 200                           # Max trees to extract per alignment
max_spr_moves: 100                       # Max SPR moves per tree
spr_move_divisor: 10                     # Divisor for constant SPR distribution
subtree_max_attempts: 100                # Max attempts for subtree replacement
subtree_target_non_mp_proportion: 0.167  # Target non-MP edge proportion (~1/6)
