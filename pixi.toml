[project]
name = "dpvt-experiments"
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64"]

[system-requirements]
linux = "4.15"
# cuda = "12.4"
libc = { family="glibc", version="2.17" }

[dependencies]
python = ">=3.11.9,<3.12"
biopython = "*"
black = "*"
ete3 = "*"
git-lfs = "*"
historydag = "*"
ipykernel = "*"
matplotlib = "*"
notebook = "*"
numpy = "*"
optuna = "*"
pandas = "*"
pytest = "*"
scikit-learn = "*"
snakefmt = "*"
snakemake = "*"
tensorboard = "*"
iqtree = "*"
usher = "<=0.6.5"
tbparse = "*"
seaborn = "*"
papermill = "*"
pytorch = ">=2.0.0,<3"
lightning = ">=2.3.3,<3"
torchmetrics = ">=1.8.2,<2"

[pypi-dependencies]
dpvt = { path = "../dpvt", editable = true }
dpvtex = { path = ".", editable = true }
