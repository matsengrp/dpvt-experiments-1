models: [
    "TraverseNN",
    "TraverseMaxPooling",
    "TraverseAvgPooling",
    "BaselineReversion",
  ]
train_data: [
  "simulated_50_seq_100_sites_500_algnmnts_filtered_0.8_spr",
  "simulated_50_seq_100_sites_500_algnmnts_filtered_0.8_subtree",
  "simulated_50_seq_100_sites_500_algnmnts_spr_subtree",
  ]
test_data: [
  "simulated_50_seq_100_sites_200_algnmnts_filtered_0.8_spr",
  "simulated_50_seq_100_sites_200_algnmnts_filtered_0.8_subtree",
  "simulated_50_seq_100_sites_200_algnmnts_spr_subtree",
  ]

device: "gpu"
timestamp: "paper"
use_cross_datasets: True
output_dir: "_output"
data_nicknames_path: "paper_nicknames.json"
use_hyperparameter_optimize: False
use_preprocessing: False
force_repreprocess: False
n_hyperparameter_trials: 50

hyperparameters:
  learning_rate: [0.00005]
  batch_size: [4]
  accum_grad_batches: [1]
  epochs: [200]
  feature_length: [64]
  dim_mlp_layers: [256]
