models: [
    "TraverseMaxPooling",
    "TraverseAvgPooling",
    "BaselineReversion", # can only run on CPU!
  ]
train_data: [
  "orthomam_train_0.5_1000_samples_spr"
  ]
test_data: [
  "simulated_25_seq_100_sites_200_algnmnts_filtered_0.8_spr",
  "simulated_50_seq_100_sites_200_algnmnts_filtered_0.8_spr",
  "orthomam_test_0.5_200_samples_spr",
  "pandit_test_0.8_spr",
  "influenzaC_fluC_M_spr",
  "influenzaC_fluC_NS_spr",
  "influenzaC_fluC_PB2_spr",
  "rotavirusA_H_H2_spr",
  ]

device: "gpu"
timestamp: "paper"
use_cross_datasets: True
output_dir: "_output"
data_nicknames_path: "paper_nicknames.json"
use_hyperparameter_optimize: False
use_preprocessing: False
force_repreprocess: False
n_hyperparameter_trials: 50

hyperparameters:
  learning_rate: [0.00005]
  batch_size: [4]
  accum_grad_batches: [1]
  epochs: [200]
  feature_length: [64]
  dim_mlp_layers: [256]
