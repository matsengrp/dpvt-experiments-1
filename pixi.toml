[project]
name = "dpvt-experiments"
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64"]

[system-requirements]
linux = "4.15"
libc = { family="glibc", version="2.17" }

[dependencies]
python = "*"
biopython = "*"
black = "*"
click = "*"
ete3 = "*"
git-lfs = "*"
historydag = "*"
ipykernel = "*"
matplotlib = "*"
notebook = "*"
numpy = "*"
optuna = "*"
pandas = "*"
pytest = "*"
scikit-learn = "*"
snakemake = "*"
tensorboard = "*"
iqtree = "*"
usher = "*"
tbparse = "*"
seaborn = "*"
papermill = "*"
# R packages
r-base = "*"
r-optparse = "*"
r-remotes = "*"
pytorch = ">=2.0.0,<3"
lightning = ">=2.3.3,<3"

[pypi-dependencies]
dpvt = { path = "../dpvt", editable = true }
dpvtex = { path = ".", editable = true }
