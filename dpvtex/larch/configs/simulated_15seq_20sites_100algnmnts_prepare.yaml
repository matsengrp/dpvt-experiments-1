# Example config for simulated alignments (15 sequences, 20 sites, 100 alignments)
# This config is for Phases 1 & 2 (preprocessing and dataset preparation)

# ============================================================================
# Dataset Identification
# ============================================================================
dataset_name: "simulated_15seq_20sites"
input_data: "../../../data/simulated_alignments/alisim_alignment_15_seq_20_sites_100_algnmnts"

# ============================================================================
# Phase 1: Preprocessing Settings (sequence-level filtering)
# ============================================================================
# Note: Simulated data typically has no gaps or ambiguous characters,
# so these settings may not filter anything, but are included for completeness
max_ambiguous_site_frac_per_seq: 0.2     # Remove sequences with >20% gaps/ambiguous chars
remove_duplicate_site_patterns: false    # Whether to deduplicate columns

# ============================================================================
# Phase 2: Dataset Preparation Settings (alignment-level filtering)
# ============================================================================
output_datasets: "../../../data"
min_frac_sites_retained: 0.8             # Exclude alignments that lost >20% of sites

# Train/test splitting
create_train_test_split: true
test_fraction: 0.2

# ============================================================================
# Phase 3: Training Data Generation Settings
# ============================================================================
larch_command: "larch"
larch_output: "../../../data"
edge_distribution: "constant"            # Options: constant, uniform, treesearch_mimic, random_subtree
num_cores: 8

# ============================================================================
# Notes:
# ============================================================================
# For simulated data without gaps/ambiguous characters, Phases 1-2 can be run
# but will likely not filter any data. The main purpose is to generate the
# train/test split and create the proper directory structure for Phase 3.
